name: Cron — Aggregate Performance

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call aggregate-performance cron endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/aggregate-performance" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Cron endpoint returned $STATUS — failing job"
            exit 1
          fi
