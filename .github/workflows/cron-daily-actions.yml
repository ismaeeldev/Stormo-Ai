name: Cron — Daily Actions

on:
  schedule:
    # Every hour on the hour (UTC). The route itself checks which users
    # are at 8am in their local timezone and generates only for them.
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call daily-actions cron endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET "${{ secrets.APP_URL }}/api/cron/daily-actions" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "Response status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Cron endpoint returned $STATUS — failing job"
            exit 1
          fi
