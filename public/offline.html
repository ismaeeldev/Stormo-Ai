<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Offline — Stormo.io</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Inter', 'Segoe UI', Arial, sans-serif;
      background: #1A1A1A;
      color: #FFFFFF;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 24px) 24px env(safe-area-inset-bottom, 24px);
      text-align: center;
      gap: 0;
    }

    .logo {
      width: 80px;
      height: 80px;
      background: #E8621A;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 44px;
      font-weight: 900;
      color: white;
      letter-spacing: -2px;
      box-shadow: 0 8px 32px rgba(232, 98, 26, 0.4);
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    p {
      color: #888888;
      font-size: 15px;
      line-height: 1.65;
      max-width: 300px;
      margin: 0 auto 36px;
    }

    button {
      background: #E8621A;
      color: white;
      border: none;
      padding: 15px 36px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover { background: #C4531A; }
    button:active { transform: scale(0.97); }

    .hint {
      margin-top: 24px;
      font-size: 12px;
      color: #555555;
    }
  </style>
</head>
<body>
  <div class="logo">S</div>
  <h1>You're Offline</h1>
  <p>Stormo needs a connection to generate your daily action plan and content. Check your internet and try again.</p>
  <button onclick="location.reload()">Try Again</button>
  <p class="hint">Your data is safe — it will sync when you reconnect.</p>
</body>
</html>
