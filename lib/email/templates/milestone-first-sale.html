<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOU GOT YOUR FIRST SALE! 🎉 - Stormo.io</title>
</head>
<body style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #F5F5F5; color: #1A1A1A; margin: 0; padding: 20px;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background-color: #FFFFFF; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; border-top: 3px solid #E8621A;">
    <tr>
      <td align="center" style="background-color: #1A1A1A; padding: 30px 20px;">
        <span style="font-size: 24px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px;">Stormo<span style="color: #E8621A;">.io</span></span>
      </td>
    </tr>
    <tr>
      <td style="padding: 40px 30px;">
        <h1 style="font-size: 22px; font-weight: 700; color: #1A1A1A; margin-top: 0; margin-bottom: 20px;">First Sale Achieved! 🎉</h1>
        <p style="font-size: 15px; line-height: 24px; color: #666666; margin-top: 0; margin-bottom: 30px;">
          Amazing news, {name}! YOU GOT YOUR FIRST SALE! 🎉 Your effort is paying off. Let's keep refining your campaigns and scaling up.
        </p>
        <table border="0" cellpadding="0" cellspacing="0" style="margin: 0 auto 30px auto;">
          <tr>
            <td align="center" bgcolor="#E8621A" style="border-radius: 8px;">
              <a href="{dashboardLink}" target="_blank" style="display: inline-block; padding: 14px 28px; font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600; color: #FFFFFF; text-decoration: none; border-radius: 8px;">Go to Dashboard</a>
            </td>
          </tr>
        </table>
        <hr style="border: 0; border-top: 1px solid #E5E7EB; margin-bottom: 30px;">
        <p style="font-size: 13px; color: #9CA3AF; margin: 0; text-align: center;">
          Here's to many more!
        </p>
      </td>
    </tr>
    <tr>
      <td align="center" style="background-color: #F9FAFB; padding: 20px; border-top: 1px solid #F3F4F6;">
        <p style="font-size: 12px; color: #666666; margin: 0;">&copy; 2026 Stormo.io. All rights reserved.</p>
      </td>
    </tr>
  </table>
</body>
</html>
